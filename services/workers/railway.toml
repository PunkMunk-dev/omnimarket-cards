[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node --experimental-specifier-resolution=node dist/worker.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = ""

[[services]]
name = "worker"

[[services]]
name = "scheduler"
startCommand = "node --experimental-specifier-resolution=node dist/scheduler.js"
